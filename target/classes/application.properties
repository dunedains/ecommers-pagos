spring.application.name=pagos
server.port=8088

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/db_pagos
spring.datasource.username=ecommers
spring.datasource.password=ecommers_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Feign clients
feign.client.order-url=http://localhost:8087

# Use Apache HttpClient 5 (supports PATCH)
spring.cloud.openfeign.httpclient.hc5.enabled=true
